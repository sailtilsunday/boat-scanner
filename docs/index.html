<!DOCTYPE html>
<html>
<head>
  <title>Boat Party Scanner 🚤</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .success { color: green; }
    .error { color: red; }
    .warning { color: orange; }
  </style>
</head>

<body>

<h2>🚤 Boat Party Check-In</h2>
<p>Scan guest QR ticket</p>

<div id="reader"></div>
<div id="status">Waiting to scan...</div>

<script>
const sheetUrl = "https://script.google.com/macros/s/AKfycbzh2wPeWJD0NeqnYjPYjFQLr88IcYUrf-N6D758PGldxqhpDiYw2XS8iZSRJvwhT1F1Lw/exec";

// Prevent double scans too quickly
let lastScan = "";
let scanningEnabled = true;

function handleScan(decodedText) {
    if (!scanningEnabled || decodedText === lastScan) return;

    scanningEnabled = false;
    lastScan = decodedText;

    document.getElementById("status").innerText = "Checking ticket...";

    fetch(sheetUrl + "?ticket=" + encodeURIComponent(decodedText))
    .then(response => response.text())
    .then(data => {
        let statusEl = document.getElementById("status");

        if (data.startsWith("CHECKED_IN")) {
            statusEl.innerText = "✅ " + data.split(":")[1] + " checked in";
            statusEl.className = "success";
        } 
        else if (data === "ALREADY_CHECKED_IN") {
            statusEl.innerText = "⚠️ Ticket already used";
            statusEl.className = "warning";
        } 
        else {
            statusEl.innerText = "❌ Invalid ticket";
            statusEl.className = "error";
        }

        // Allow scanning again after 2 seconds
        setTimeout(() => {
            scanningEnabled = true;
            statusEl.innerText = "Ready to scan next ticket...";
            statusEl.className = "";
        }, 2000);
    })
    .catch(() => {
        document.getElementById("status").innerText = "❌ Connection error";
        document.getElementById("status").className = "error";
        scanningEnabled = true;
    });
}

// Start camera scanner
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    handleScan
);
</script>

</body>
</html>
